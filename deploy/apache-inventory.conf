<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/Inventory-Management-SaaS/public

    <Directory /var/www/Inventory-Management-SaaS/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/inventory-error.log
    CustomLog ${APACHE_LOG_DIR}/inventory-access.log combined
</VirtualHost>
