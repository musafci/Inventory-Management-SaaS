x-app-environment: &app-environment
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:8080
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: inventory
  DB_USERNAME: inventory
  DB_PASSWORD: secret
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/var/www/html
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  app:
    <<: *app-base
    ports:
      - "8080:8000"
    environment:
      <<: *app-environment

  horizon:
    <<: *app-base
    command: php artisan horizon
    environment:
      <<: *app-environment
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
